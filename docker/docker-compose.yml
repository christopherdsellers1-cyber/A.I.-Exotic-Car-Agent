version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: porsche_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-exotic_car_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - porsche_network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: porsche_scraper
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-exotic_car_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UPDATE_FREQUENCY_HOURS: ${UPDATE_FREQUENCY_HOURS:-12}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    networks:
      - porsche_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  porsche_network:
    driver: bridge
